name: CI

on:
  push:
    branches: [main, inference]
  pull_request:
    branches: [main, inference]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: threadsense
          POSTGRES_PASSWORD: threadsense
          POSTGRES_DB: threadsense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U threadsense"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://threadsense:threadsense@localhost:5432/threadsense_test
      TEST_DATABASE_URL: postgresql+asyncpg://threadsense:threadsense@localhost:5432/threadsense_test
      REDIS_URL: redis://localhost:6379/0
      THREADSENSE_ADMIN_KEY: ci-test-secret
      APP_ENV: test
      OPENROUTER_API_KEY: ""
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv sync --dev

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U threadsense; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=threadsense psql -h localhost -U threadsense -d threadsense_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        run: |
          uv run pytest backend/tests/ -v --tb=short -x

      - name: Lint check
        run: |
          uv run ruff check backend/src/ --select E,W,F --ignore E501
        continue-on-error: true

  # ── Frontend Checks ───────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker Build Validation ───────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: runtime
          tags: threadsense-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
