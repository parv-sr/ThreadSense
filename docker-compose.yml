services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadsense-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_TOKEN: ${REDIS_TOKEN}
      TASKIQ_RESULT_TTL_SECONDS: ${TASKIQ_RESULT_TTL_SECONDS:-3600}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_CLUSTER_ENDPOINT: ${QDRANT_CLUSTER_ENDPOINT}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - ./backend:/app/backend
      - ./rust_parser:/app/rust_parser
      - uploads:/app/uploads
    command: >
      sh -c "
        uv run python -m backend.src.startup &&
        uv run uvicorn backend.src.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadsense-worker
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_TOKEN: ${REDIS_TOKEN}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - ./backend:/app/backend
      - ./rust_parser:/app/rust_parser
      - uploads:/app/uploads
    depends_on:
      - api 
    command: >
      sh -c "uv run taskiq worker backend.src.tasks:broker --workers 2 --max-async-tasks 20"

volumes:
  uploads:
