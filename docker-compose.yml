services:
  postgres:
    # Swapped plain postgres for pgvector to support your required extensions and fix locale warnings
    image: pgvector/pgvector:pg16 
    container_name: threadsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threadsense
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threadsense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck: # Added explicit healthcheck for precise startup sequencing
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    # Bumped to latest to resolve client v1.17.1 vs server v1.12.0 mismatch warning
    image: qdrant/qdrant:latest 
    container_name: threadsense-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Replaced fragile bash TCP check with Qdrant's native HTTP readiness probe
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadsense-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/threadsense
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app/backend
      - ./rust_parser:/app/rust_parser
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy # Hardened from service_started
      qdrant:
        condition: service_healthy
    # STRIPPED destructive autogenerate logic. Runs standard upgrade head safely.
    command: >
      sh -c "
        echo '=== Running Database Migrations ===' &&
        uv run alembic -c backend/alembic.ini upgrade head &&
        echo '=== Migrations completed ===' &&
        echo 'Starting uvicorn...' &&
        uv run uvicorn backend.src.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads: