services:
  db:
    image: pgvector/pgvector:pg15
    container_name: threadsense-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threadsense}
      POSTGRES_USER: ${POSTGRES_USER:-threadsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threadsense}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: threadsense-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadsense-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-threadsense}:${POSTGRES_PASSWORD:-threadsense}@db:5432/${POSTGRES_DB:-threadsense}
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-3-flash-preview}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      THREADSENSE_ADMIN_KEY: ${THREADSENSE_ADMIN_KEY:-change-me}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadsense-worker
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-threadsense}:${POSTGRES_PASSWORD:-threadsense}@db:5432/${POSTGRES_DB:-threadsense}
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-1.5-flash}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      THREADSENSE_ADMIN_KEY: ${THREADSENSE_ADMIN_KEY:-change-me}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "src.tasks", "worker", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: threadsense-frontend
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: threadsense-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      THREADSENSE_DOMAIN: ${THREADSENSE_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uploads:
